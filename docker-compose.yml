services:
  db:
    image: mysql:8.0
    container_name: farmacia_jombaca_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-jombacaRoot}
      MYSQL_DATABASE: ${DB_NAME:-farmacia_jombaca}
      MYSQL_USER: ${DB_USER:-jombaca_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jombaca_mainUser2026}
    ports:
      - "3306:3306"                         # Permite acessar o MySQL do host
    volumes:
      - db_data:/var/lib/mysql              # Persiste os dados
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network

  web:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: farmacia_jombaca_web
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-farmacia_jombaca}
      DB_USER: ${DB_USER:-jombaca_user}
      DB_PASSWORD: ${DB_PASSWORD:-jombaca_mainUser2026}
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: