version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: farmacia_jombaca_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: jombacaRoot 
      MYSQL_DATABASE: farmacia_jombaca
      MYSQL_USER: jombaca_user
      MYSQL_PASSWORD: jombaca_mainUser2026  
    ports:
      - "3306:3306"                         # Permite acessar o MySQL do host
    volumes:
      - ./db:/var/lib/mysql                 # Persiste os dados
    networks:
      - app-network

  web:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: farmacia_jombaca_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge